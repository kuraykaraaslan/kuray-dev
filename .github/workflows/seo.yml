name: SEO

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Fast, dependency-free gate: the SEO logic unit tests (hreflang, JSON-LD,
  # sitemap, robots). Deterministic and runs on every push/PR.
  seo-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run test:seo

  # Full-page audits (Lighthouse SEO=100 / a11y>=95 + meta-completeness crawl).
  # Needs a production build served with DB + Redis reachable — point at a seeded
  # test instance or a preview deployment via LHCI_BASE_URL / AUDIT_BASE_URL.
  # Gated to pushes on main; relies on repo/environment secrets for the data layer.
  seo-audit:
    runs-on: ubuntu-latest
    needs: seo-unit
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'http://localhost:3000' }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
      - name: Lighthouse CI (SEO + a11y)
        run: npm run lhci
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
